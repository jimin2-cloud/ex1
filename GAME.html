<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카트라이더 라이벌 매칭 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #0a0e17;
            color: #e0e6ed;
        }
        .cyber-panel {
            background: rgba(20, 27, 45, 0.8);
            border: 1px solid #1f293a;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.1);
        }
        .neon-input:focus {
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.5);
            border-color: #00f2fe;
        }
        .neon-btn {
            background: linear-gradient(45deg, #00f2fe, #4facfe);
            transition: all 0.3s ease;
        }
        .neon-btn:hover {
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.8);
            transform: translateY(-2px);
        }
        @keyframes fadeInScale {
            0% { opacity: 0; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1); }
        }
        .team-card {
            animation: fadeInScale 0.4s ease-out forwards;
        }
        .team-a-glow { box-shadow: 0 0 20px rgba(59, 130, 246, 0.3); border-color: #3b82f6; }
        .team-b-glow { box-shadow: 0 0 20px rgba(239, 68, 68, 0.3); border-color: #ef4444; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4 md:p-8">

    <div class="text-center mb-8 w-full max-w-4xl">
        <div class="inline-block bg-blue-900/30 text-blue-300 text-xs px-3 py-1 rounded-full mb-2 border border-blue-800 uppercase tracking-widest">
            Rival Balanced Matcher v2.0
        </div>
        <h1 class="text-4xl md:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-cyan-300 to-blue-500">
            라이벌 고정 매칭
        </h1>
        <p class="text-gray-400 mt-2">상대팀으로 찢어놓을 라이벌끼리 콜론(:)으로 묶어주세요.</p>
    </div>

    <div class="w-full max-w-5xl flex flex-col gap-8">
        <div class="cyber-panel rounded-2xl p-6 md:p-8">
            <div class="flex flex-col gap-4">
                <label for="name-input" class="block text-sm font-medium text-cyan-300">라이더 대진표 입력 (라이벌1:라이벌2 순서)</label>
                <textarea id="name-input" rows="3" 
                    class="neon-input w-full bg-[#0d131f] border border-gray-700 rounded-xl p-4 text-white placeholder-gray-600 focus:ring-0"
                    placeholder="예: 다오:배찌, 마리드:우니, 디지니:에띠, 모스:케피, 타키:라비">다오:배찌, 마리드:우니, 디지니:에띠, 모스:케피, 타키:라비</textarea>
                
                <button onclick="generateTeams()" 
                    class="neon-btn w-full text-black font-bold py-4 rounded-xl text-lg flex items-center justify-center gap-2">
                    팀 나누기 (라이벌 찢기)
                </button>
            </div>
            <div id="status-msg" class="text-xs text-gray-500 mt-4 leading-relaxed">
                * 총 5쌍(10명)이 필요합니다. <br>
                * 콜론(:)으로 연결된 두 명은 무조건 서로 반대 팀에 배치됩니다.
            </div>
        </div>

        <div id="result-panel" class="hidden grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="cyber-panel team-card team-a-glow rounded-2xl overflow-hidden">
                <div class="bg-blue-600/20 px-6 py-4 border-b border-blue-900 flex items-center justify-between">
                    <h3 class="text-2xl font-bold text-blue-400 italic">TEAM BLUE</h3>
                </div>
                <ul id="team-a" class="p-6 space-y-3"></ul>
            </div>

            <div class="cyber-panel team-card team-b-glow rounded-2xl overflow-hidden">
                <div class="bg-red-600/20 px-6 py-4 border-b border-red-900 flex items-center justify-between">
                    <h3 class="text-2xl font-bold text-red-400 italic">TEAM RED</h3>
                </div>
                <ul id="team-b" class="p-6 space-y-3"></ul>
            </div>
        </div>

        <div id="no-result" class="cyber-panel rounded-2xl p-10 text-center text-gray-600 border-dashed">
            <p>라이벌 쌍을 입력하고 버튼을 누르세요.</p>
        </div>
    </div>

    <script>
        function generateTeams() {
            const input = document.getElementById('name-input').value;
            // 콤마로 쌍(Pair) 구분
            const pairList = input.split(',').map(p => p.trim()).filter(p => p !== "");

            if (pairList.length !== 5) {
                alert("정확히 5쌍의 라이벌 정보가 필요합니다! (현재 " + pairList.length + "쌍)");
                return;
            }

            let teamA = [];
            let teamB = [];

            try {
                pairList.forEach(pairStr => {
                    const members = pairStr.split(':').map(m => m.trim());
                    
                    if (members.length !== 2) {
                        throw new Error("형식이 올바르지 않습니다. (이름:이름)");
                    }

                    // 50% 확률로 1번이 A팀 혹은 B팀으로 가고, 2번은 무조건 반대로 배치
                    if (Math.random() < 0.5) {
                        teamA.push({ name: members[0], rival: members[1] });
                        teamB.push({ name: members[1], rival: members[0] });
                    } else {
                        teamA.push({ name: members[1], rival: members[0] });
                        teamB.push({ name: members[0], rival: members[1] });
                    }
                });

                // 팀 내부 순서만 랜덤하게 섞어줌 (시각적 재미)
                teamA.sort(() => Math.random() - 0.5);
                teamB.sort(() => Math.random() - 0.5);

                // UI 업데이트
                document.getElementById('no-result').classList.add('hidden');
                document.getElementById('result-panel').classList.remove('hidden');

                renderList('team-a', teamA, 'text-blue-300', 'bg-blue-500');
                renderList('team-b', teamB, 'text-red-300', 'bg-red-500');

            } catch (e) {
                alert(e.message);
            }
        }

        function renderList(elementId, members, colorClass, bgClass) {
            const el = document.getElementById(elementId);
            el.innerHTML = members.map((m, index) => `
                <li class="flex flex-col bg-[#0d131f] p-4 rounded-xl border border-gray-800 hover:border-gray-600 transition-colors">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-3">
                            <span class="text-xs text-gray-600 font-mono">${index + 1}</span>
                            <span class="w-2 h-2 rounded-full ${bgClass} shadow-[0_0_8px_rgba(255,255,255,0.5)]"></span>
                            <span class="font-bold ${colorClass} text-lg tracking-tight">${m.name}</span>
                        </div>
                    </div>
                    <div class="mt-2 ml-7 text-[10px] text-gray-500 flex items-center gap-2">
                        <span class="bg-gray-800 px-1.5 py-0.5 rounded text-gray-400">RIVAL</span>
                        <span class="italic">vs ${m.rival}</span>
                    </div>
                </li>
            `).join('');
        }
    </script>
</body>
</html>
