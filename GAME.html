<div class="mt-8 p-6 bg-white rounded-lg shadow">
    <h3 class="text-lg font-bold mb-4">랜덤 팀 구성하기 (5:5)</h3>
    <textarea id="name-input" class="w-full p-2 border rounded" placeholder="이름을 쉼표로 구분해서 10명 입력하세요 (예: 다오,배찌,디지니...)"></textarea>
    <button onclick="generateTeams()" class="mt-2 bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">팀 나누기</button>

    <div class="grid grid-cols-2 gap-4 mt-4">
        <div class="p-4 bg-blue-50 rounded">
            <h4 class="font-bold text-blue-700">A팀</h4>
            <ul id="team-a" class="list-disc ml-5"></ul>
        </div>
        <div class="p-4 bg-red-50 rounded">
            <h4 class="font-bold text-red-700">B팀</h4>
            <ul id="team-b" class="list-disc ml-5"></ul>
        </div>
    </div>
</div>

<script>
function generateTeams() {
    const input = document.getElementById('name-input').value;
    // 쉼표로 구분하고 공백 제거
    let names = input.split(',').map(name => name.trim()).filter(name => name !== "");

    if (names.length !== 10) {
        alert("정확히 10명의 이름을 입력해주세요! (현재 " + names.length + "명)");
        return;
    }

    // 배열 무작위 섞기
    names.sort(() => Math.random() - 0.5);

    // 팀 배정
    const teamA = names.slice(0, 5);
    const teamB = names.slice(5, 10);

    // 화면에 출력
    renderTeam('team-a', teamA);
    renderTeam('team-b', teamB);
}

function renderTeam(elementId, members) {
    const el = document.getElementById(elementId);
    el.innerHTML = members.map(m => `<li>${m}</li>`).join('');
}
</script>
