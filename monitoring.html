<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>금연클리닉 모니터링 검색</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', 'Noto Sans KR', sans-serif;
        }
        .table-responsive {
            display: block;
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-4xl bg-white rounded-xl shadow-lg p-6 md:p-8">

        <!-- 헤더 -->
        <div class="mb-6">
            <h1 class="text-2xl md:text-3xl font-bold text-gray-800">보건소 월별 모니터링</h1>
            <p class="text-gray-500 mt-1">금연클리닉 참여자 검색</p>
        </div>

        <!-- 검색 조건 영역 -->
        <div class="bg-gray-50 border border-gray-200 rounded-lg p-4 md:p-6 mb-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 items-end">
                <!-- 과태료 감면 필터 -->
                <div class="col-span-1">
                    <label for="fine-filter" class="block text-sm font-medium text-gray-700 mb-1">과태료 감면</label>
                    <select id="fine-filter" class="w-full bg-white border border-gray-300 rounded-md shadow-sm p-2 focus:ring-indigo-500 focus:border-indigo-500">
                        <option value="all">전체</option>
                        <option value="true">감면자</option>
                        <option value="false">비감면자</option>
                    </select>
                </div>
                <!-- 손목닥터9988 필터 -->
                <div class="col-span-1">
                    <label for="doctor-filter" class="block text-sm font-medium text-gray-700 mb-1">손목닥터9988</label>
                    <select id="doctor-filter" class="w-full bg-white border border-gray-300 rounded-md shadow-sm p-2 focus:ring-indigo-500 focus:border-indigo-500">
                        <option value="all">전체</option>
                        <option value="true">참여자</option>
                        <option value="false">비참여자</option>
                    </select>
                </div>
                <!-- 검색 버튼 -->
                <div class="col-span-1">
                    <button id="search-btn" class="w-full bg-indigo-600 text-white font-bold py-2 px-4 rounded-md hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition duration-150 ease-in-out">
                        검색
                    </button>
                </div>
            </div>
        </div>

        <!-- 결과 영역 -->
        <div>
            <h2 class="text-xl font-semibold text-gray-700 mb-2">검색 결과</h2>
            <p id="result-count" class="text-sm text-gray-600 mb-4">총 0명의 참여자가 검색되었습니다.</p>
            <div class="border rounded-lg overflow-hidden">
                <div class="table-responsive">
                    <table class="min-w-full bg-white">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">이름</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">과태료 감면</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">손목닥터9988</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">유형</th>
                            </tr>
                        </thead>
                        <tbody id="result-table-body" class="divide-y divide-gray-200">
                        </tbody>
                    </table>
                </div>
            </div>
             <div id="no-results" class="hidden text-center py-10 px-6 bg-gray-50 rounded-lg">
                <p class="text-gray-500">검색 결과가 없습니다.</p>
            </div>
        </div>
    </div>

    <script>
        const participants = [
            { name: '김민준', fine: false, doctor: false, type: '일반 참여자' },
            { name: '이서연', fine: true,  doctor: false, type: '과태료 감면 참여자' },
            { name: '박도윤', fine: false, doctor: true,  type: '손목닥터 참여자' },
            { name: '최아린', fine: true,  doctor: true,  type: '과태료+손목닥터' },
            { name: '정하준', fine: false, doctor: false, type: '일반 참여자' },
            { name: '윤지우', fine: true,  doctor: false, type: '과태료 감면 참여자' },
            { name: '강시우', fine: false, doctor: true,  type: '손목닥터 참여자' },
            { name: '조서아', fine: true,  doctor: true,  type: '과태료+손목닥터' },
            { name: '한예준', fine: false, doctor: false, type: '일반 참여자' },
            { name: '송하윤', fine: true,  doctor: false, type: '과태료 감면 참여자' },
        ];

        const fineFilter = document.getElementById('fine-filter');
        const doctorFilter = document.getElementById('doctor-filter');
        const searchBtn = document.getElementById('search-btn');
        const resultTableBody = document.getElementById('result-table-body');
        const resultCount = document.getElementById('result-count');
        const noResultsMessage = document.getElementById('no-results');

        function performSearch() {
            const fineValue = fineFilter.value;
            const doctorValue = doctorFilter.value;

            const filteredData = participants.filter(p => {
                const fineMatch = (fineValue === 'all') || (String(p.fine) === fineValue);
                const doctorMatch = (doctorValue === 'all') || (String(p.doctor) === doctorValue);
                return fineMatch && doctorMatch;
            });

            renderTable(filteredData);
        }

        function renderTable(data) {
            resultTableBody.innerHTML = '';
            resultCount.textContent = `총 ${data.length}명의 참여자가 검색되었습니다.`;

            if (data.length === 0) {
                noResultsMessage.classList.remove('hidden');
            } else {
                noResultsMessage.classList.add('hidden');
                data.forEach(p => {
                    const row = `
                        <tr class="hover:bg-gray-50">
                            <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">${p.name}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${renderStatus(p.fine, '감면', '해당 없음')}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${renderStatus(p.doctor, '참여', '해당 없음')}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-700">${p.type}</td>
                        </tr>
                    `;
                    resultTableBody.innerHTML += row;
                });
            }
        }

        function renderStatus(status, trueText, falseText) {
            if (status) {
                return `<span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-green-100 text-green-800">${trueText}</span>`;
            } else {
                return `<span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-red-100 text-red-800">${falseText}</span>`;
            }
        }

        searchBtn.addEventListener('click', performSearch);
        window.onload = () => {
            performSearch();
        };
    </script>
</body>
</html>
